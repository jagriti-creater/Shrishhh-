<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
}

/* Sections */
section{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

/* Buttons */
button{
  padding:12px 28px;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
}
button.next{
  background:#ff2ea6;
  color:white;
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
}
#backBtn{
  background:#00ff00;
  color:black;
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  display:none;
}

/* Video */
video{
  width:90%;
  max-width:500px;
  border-radius:15px;
}

/* Section 3 Horizontal Canvas Wrapper */
#wrapper3{
  transform: rotate(90deg);
  width:100vh;
  height:100vw;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Canvas */
#canvas3{
  width:100%;
  height:100%;
}

/* Section 5 Gallery */
.gallery-container{
  width:300px;
  height:300px;
  perspective:1200px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:40px;
  margin-bottom:60px;
}
.gallery{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:rotate 18s linear infinite;
}
.gallery img{
  position:absolute;
  width:160px;
  height:160px;
  object-fit:cover;
  border-radius:15px;
  left:50%;
  top:50%;
  transform-origin:center center;
  cursor:pointer;
  transition: all 0.4s ease;
  backface-visibility:hidden;
}
/* 8 Photos Circle */
.gallery img:nth-child(1){transform:rotateY(0deg) translateZ(250px);}
.gallery img:nth-child(2){transform:rotateY(45deg) translateZ(250px);}
.gallery img:nth-child(3){transform:rotateY(90deg) translateZ(250px);}
.gallery img:nth-child(4){transform:rotateY(135deg) translateZ(250px);}
.gallery img:nth-child(5){transform:rotateY(180deg) translateZ(250px);}
.gallery img:nth-child(6){transform:rotateY(225deg) translateZ(250px);}
.gallery img:nth-child(7){transform:rotateY(270deg) translateZ(250px);}
.gallery img:nth-child(8){transform:rotateY(315deg) translateZ(250px);}

@keyframes rotate{
  from{transform:rotateY(0deg);}
  to{transform:rotateY(360deg);}
}
</style>
</head>
<body>

<!-- SECTION 1 -->
<section id="sec1">
  <h1>Hey Wait 💖</h1>
</section>

<!-- SECTION 2 VIDEO -->
<section id="sec2" style="display:none">
  <video id="video" src="video.mp4"></video>
</section>

<!-- SECTION 3 BIRTHDAY ANIMATION (Horizontal) -->
<section id="sec3" style="display:none">
  <div id="wrapper3">
    <canvas id="canvas3"></canvas>
  </div>
</section>

<!-- SECTION 4 WISHES -->
<section id="sec4" style="display:none">
  <h2>Best Wishes 💖</h2>
  <p style="padding:20px">
    May your day be filled with happiness, laughter and love.<br>
    You deserve all the best moments in life.
  </p>
  <button class="next" onclick="showSection(5)">Next ➜</button>
</section>

<!-- SECTION 5 PHOTOS -->
<section id="sec5" style="display:none">
  <h2>Happiest Birthday 🎉</h2>
  <audio id="song" src="song.mp3"></audio>
  <div class="gallery-container">
    <div class="gallery" id="gallery">
      <img src="p1.jpg">
      <img src="p2.jpg">
      <img src="p3.jpg">
      <img src="p4.jpg">
      <img src="p5.jpg">
      <img src="p6.jpg">
      <img src="p7.jpg">
      <img src="p8.jpg">
    </div>
  </div>
  <button id="backBtn" onclick="closeZoom()">Back</button>
  <button class="next" onclick="nextSection()">Next</button>
</section>

<!-- SECTION 6 FINAL -->
<section id="sec6" style="display:none">
  <h1>HAPPY BIRTHDAY</h1>
  <h2>ONCE AGAIN</h2>
  <h1>MY CRIME PARTNER ❤️</h1>
</section>

<script>
/* Section Control */
function showSection(n){
  document.querySelectorAll("section").forEach(s=>s.style.display="none")
  document.getElementById("sec"+n).style.display="flex"

  // Section 2 video
  if(n==2){
    let video=document.getElementById("video")
    video.play()
    video.onended=function(){ showSection(3); startAnimation() }
  }

  // Section 5 song
  let song=document.getElementById("song")
  if(n==5){ song.play() }else{ song.pause(); song.currentTime=0 }
}

/* Section 1 auto -> 2 */
setTimeout(()=>{ showSection(2) },2000)

/* SECTION 3 Birthday Animation Horizontal */
let canvas=document.getElementById("canvas3")
let ctx=canvas.getContext("2d")
function resizeCanvas(){canvas.width=window.innerHeight; canvas.height=window.innerWidth;}
resizeCanvas()
window.addEventListener("resize", resizeCanvas)

let particles=[]
let texts=["3","2","1","Happy Birthday","To My Crime Partner"]

function createText(text){
  particles=[]
  ctx.clearRect(0,0,canvas.width,canvas.height)
  let size
  if(text=="3"||text=="2"||text=="1"){size=canvas.width*0.35}
  else if(text=="Happy Birthday"){size=canvas.width*0.22}
  else{size=canvas.width*0.18}
  ctx.fillStyle="white"
  ctx.font="bold "+size+"px Arial"
  ctx.textAlign="center"
  ctx.textBaseline="middle"
  ctx.fillText(text,canvas.height/2,canvas.width/2)
  let data=ctx.getImageData(0,0,canvas.width,canvas.height).data
  for(let y=0;y<canvas.height;y+=6){
    for(let x=0;x<canvas.width;x+=6){
      let i=(y*canvas.width+x)*4
      if(data[i+3]>150){
        particles.push({x:Math.random()*canvas.width, y:-Math.random()*canvas.height, tx:x, ty:y, speed:2+Math.random()*2})
      }
    }
  }
  ctx.clearRect(0,0,canvas.width,canvas.height)
}

function animateText(){
  ctx.clearRect(0,0,canvas.width,canvas.height)
  particles.forEach(p=>{
    p.x+=(p.tx-p.x)*0.03
    p.y+=(p.ty-p.y)*0.03
    ctx.fillStyle="#ff4da6"
    ctx.beginPath()
    ctx.rect(p.x,p.y,4,4)
    ctx.fill()
  })
  requestAnimationFrame(animateText)
}

function startAnimation(){
  let i=0
  function nextText(){
    if(i>=texts.length) return
    createText(texts[i])
    animateText()
    let delay = i<3 ? 1000 : 2500
    i++
    setTimeout(nextText, delay)
  }
  nextText()
}

/* SECTION 5: Gallery Zoom */
const gallery = document.getElementById("gallery")
const backBtn = document.getElementById("backBtn")
let zoomed = false

gallery.querySelectorAll("img").forEach(img=>{
  img.addEventListener("click",()=>{
    if(zoomed) return
    zoomed = true
    gallery.style.animationPlayState="paused"
    img.style.position="fixed"
    img.style.left="50%"
    img.style.top="50%"
    img.style.transform="translate(-50%, -50%) scale(1.2)"
    img.style.width="80vw"
    img.style.height="80vh"
    img.style.zIndex="30"
    backBtn.style.display="block"
    document.querySelector("button.next").style.display="none"
  })
})

function closeZoom(){
  zoomed=false
  backBtn.style.display="none"
  document.querySelector("button.next").style.display="block"
  gallery.style.animationPlayState="running"
  gallery.querySelectorAll("img").forEach(img=>{
    img.style.position="absolute"
    img.style.width="160px"
    img.style.height="160px"
    img.style.zIndex="1"
  })
}

/* Section 5 Next */
function nextSection(){ showSection(6) }
</script>
</body>
</html>
