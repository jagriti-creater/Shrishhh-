<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

/* Sections */
section{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:black;
  color:white;
  position:relative;
}

/* Video */
video{
  width:90%;
  max-width:500px;
  border-radius:15px;
}

/* Next Button */
button{
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:#ff2ea6;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 15px #ff2ea6;
  margin-top:20px;
}
.next{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
}

/* Section 5 - 360 rotating gallery */
.gallery{
  position:relative;
  width:250px;
  height:250px;
  transform-style:preserve-3d;
  animation:rotate 25s linear infinite;
}
.gallery img{
  position:absolute;
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:15px;
  left:55px;
  top:55px;
}
@keyframes rotate{
  from{transform:rotateY(0deg);}
  to{transform:rotateY(360deg);}
}

h1{font-size:40px;}
h2{font-size:32px;}
p{font-size:22px;}
</style>
</head>

<body>

<!-- SECTION 1 -->
<section id="sec1">
  <h1>Hey Wait 💖</h1>
</section>

<!-- SECTION 2 VIDEO -->
<section id="sec2" style="display:none">
  <video id="video" src="video.mp4" muted playsinline></video>
</section>

<!-- SECTION 3 BIRTHDAY ANIMATION -->
<section id="sec3" style="display:none; overflow:hidden;">
  <div class="wrapper">
    <canvas id="canvas3"></canvas>
  </div>
</section>

<!-- SECTION 4 WISHES -->
<section id="sec4" style="display:none">
  <h2>Best Wishes 💖</h2>
  <p>
    May your day be filled with happiness, laughter and love.<br>
    You deserve all the best moments in life.
  </p>
  <button class="next" onclick="showSection(5)">Next ➜</button>
</section>

<!-- SECTION 5 PHOTOS -->
<section id="sec5" style="display:none">
  <h2>Happiest Birthday 🎉</h2>
  <audio id="song" src="song.mp3"></audio>
  <div class="gallery">
    <img src="p1.jpg" style="transform:rotateY(0deg) translateZ(250px)">
    <img src="p2.jpg" style="transform:rotateY(45deg) translateZ(250px)">
    <img src="p3.jpg" style="transform:rotateY(90deg) translateZ(250px)">
    <img src="p4.jpg" style="transform:rotateY(135deg) translateZ(250px)">
    <img src="p5.jpg" style="transform:rotateY(180deg) translateZ(250px)">
    <img src="p6.jpg" style="transform:rotateY(225deg) translateZ(250px)">
    <img src="p7.jpg" style="transform:rotateY(270deg) translateZ(250px)">
    <img src="p8.jpg" style="transform:rotateY(315deg) translateZ(250px)">
  </div>
  <button class="next" onclick="showSection(6)">Next ➜</button>
</section>

<!-- SECTION 6 FINAL -->
<section id="sec6" style="display:none">
  <h1>HAPPY BIRTHDAY</h1>
  <h2>ONCE AGAIN</h2>
  <h1>MY CRIME PARTNER ❤️</h1>
</section>

<script>
// ------------------- Section Control -------------------
function showSection(n){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  document.getElementById("sec"+n).style.display="flex";

  // Section 2 Video autoplay
  let video=document.getElementById("video");
  if(n==2){
    video.muted=true;
    video.play().catch(()=>console.log("Autoplay blocked"));
    video.onended=function(){ showSection(3); startAnimation3(); };
  }

  // Section 5 song autoplay
  let song=document.getElementById("song");
  if(n==5){
    song.play();
  } else {
    song.pause();
    song.currentTime=0;
  }
}

// ------------------- Automatic Section Flow -------------------
setTimeout(()=>{ showSection(2); }, 2000); // Section1 -> 2 after 2s

// ------------------- Section 3 Birthday Animation -------------------
const canvas3 = document.getElementById("canvas3");
const ctx3 = canvas3.getContext("2d");
function resizeCanvas3(){
  canvas3.width = window.innerHeight;
  canvas3.height = window.innerWidth;
}
resizeCanvas3();
window.addEventListener('resize', resizeCanvas3);

let particles3 = [];
let texts3 = ["3","2","1","Happy Birthday","To My Crime Partner"];
let i3 = 0;

function createText3(text){
  particles3 = [];
  ctx3.clearRect(0,0,canvas3.width,canvas3.height);

  let size;
  if(text=="3"||text=="2"||text=="1") size=canvas3.height*0.35;
  else if(text=="Happy Birthday") size=canvas3.height*0.22;
  else size=canvas3.height*0.18;

  ctx3.fillStyle="white";
  ctx3.font="bold "+size+"px Arial";
  ctx3.textAlign="center";
  ctx3.textBaseline="middle";

  ctx3.fillText(text,canvas3.width/2,canvas3.height/2);

  let data = ctx3.getImageData(0,0,canvas3.width,canvas3.height).data;

  for(let y=0;y<canvas3.height;y+=10){
    for(let x=0;x<canvas3.width;x+=10){
      let idx = (y*canvas3.width + x)*4;
      if(data[idx+3]>150){
        particles3.push({
          x: Math.random()*canvas3.width,
          y: -Math.random()*canvas3.height,
          tx: x,
          ty: y,
          speed: 1 + Math.random()*2
        });
      }
    }
  }
  ctx3.clearRect(0,0,canvas3.width,canvas3.height);
}

function animate3(){
  ctx3.clearRect(0,0,canvas3.width,canvas3.height);
  particles3.forEach(p=>{
    p.x += (p.tx-p.x)*0.05;
    p.y += (p.ty-p.y)*0.05;
    ctx3.fillStyle="#ff4da6";
    ctx3.fillRect(p.x,p.y,6,6);
  });
  requestAnimationFrame(animate3);
}

function startAnimation3(){
  animate3();
  function nextText(){
    if(i3<texts3.length){
      createText3(texts3[i3]);
      let delay = (texts3[i3]=="Happy Birthday"||texts3[i3]=="To My Crime Partner")?2500:2000;
      i3++;
      setTimeout(nextText, delay);
    } else {
      // automatic next section after animation
      showSection(4);
    }
  }
  nextText();
}
</script>
</body>
</html>
